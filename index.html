<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ежииик</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      background: #3b3b3b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
      position: relative;
      margin: 0;
      padding: 20px;
      touch-action: manipulation;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .game-container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .top-bar {
      position: fixed;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 50;
      pointer-events: none;
      background: rgba(0,0,0,0.3);
      padding: 3px 14px;
      border-radius: 14px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .version {
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 13px;
      color: #888888;
      text-shadow: none;
      pointer-events: none;
      opacity: 0.7;
    }

    .timer {
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 13px;
      color: #00bcd4;
      text-shadow: 0 0 15px #00bcd4, 0 0 30px rgba(0,188,212,0.3);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .timer.visible {
      opacity: 1;
    }

    .click-counter {
      color: #00bcd4;
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: clamp(2.2rem, 7vw, 3rem);
      margin-bottom: 5px;
      margin-top: -80px;
      text-align: center;
      transition: opacity 0.2s;
      z-index: 10;
      text-shadow: 0 0 20px #00bcd4, 0 0 40px rgba(0,188,212,0.5);
    }

    .hedgehog-area {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }

    .hedgehog {
      font-size: clamp(12rem, 40vw, 24rem);
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.25s ease, opacity 0.3s;
      position: relative;
      display: inline-block;
      line-height: 1;
      filter: drop-shadow(0 0 0 transparent);
      z-index: 5;
      user-select: none;
      touch-action: none;
    }

    .hedgehog:active {
      transform: scale(0.9);
    }

    .hedgehog.glow-active {
      filter: drop-shadow(0 0 18px #ff69b4) drop-shadow(0 0 35px rgba(255,105,180,0.8));
    }

    .hedgehog.shaking {
      animation: shake 0.3s ease-in-out;
    }

    .hedgehog.hold-glow {
      filter: drop-shadow(0 0 30px #ff69b4) drop-shadow(0 0 60px rgba(255,105,180,0.9)) !important;
      animation: holdShake 0.08s ease-in-out infinite alternate !important;
    }

    @keyframes holdShake {
      0% { transform: translateX(-3px) scale(0.95); }
      100% { transform: translateX(3px) scale(0.95); }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .hedgehog.green-glow {
      filter: drop-shadow(0 0 25px #00ff00) drop-shadow(0 0 50px #00ff00);
      animation: spinAccelerate 3s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
    }

    @keyframes spinAccelerate {
      0% { transform: rotate(0deg); animation-timing-function: ease-in; }
      30% { transform: rotate(360deg); animation-timing-function: linear; }
      70% { transform: rotate(1080deg); animation-timing-function: linear; }
      100% { transform: rotate(3600deg); }
    }

    .hold-hint {
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 10px;
      color: #ff69b4;
      text-shadow: 0 0 20px #ff69b4, 0 0 40px rgba(255,105,180,0.6), 0 0 60px rgba(255,105,180,0.3);
      margin-top: 8px;
      text-align: center;
      transition: opacity 0.3s;
      z-index: 5;
      letter-spacing: 1px;
    }

    .hold-hint.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .hunt-container {
      position: relative;
      width: 100%;
      height: 420px;
      overflow: hidden;
      background: transparent;
      border-radius: 12px;
      margin-top: 5px;
    }

    .hunt-counter-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .hunt-counter {
      color: #ff69b4;
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 1.6rem;
      margin-bottom: 8px;
      text-align: center;
      text-shadow: 0 0 12px #ff69b4;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .hunt-counter.full {
      color: #ff0000;
      text-shadow: 0 0 20px #ff0000, 0 0 40px rgba(255,0,0,0.6), 0 0 60px rgba(255,0,0,0.3);
      animation: counterPulse 1s ease-in-out infinite;
    }

    @keyframes counterPulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .money-counter {
      color: #00bcd4;
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 1.6rem;
      margin-bottom: 5px;
      text-align: center;
      width: 100%;
      text-shadow: 0 0 12px #00bcd4;
      position: relative;
    }

    .deduct-particle {
      position: fixed;
      font-size: 10px;
      font-weight: bold;
      color: #ff0000;
      text-shadow: 0 0 20px #ff0000, 0 0 40px rgba(255,0,0,0.8), 0 0 60px rgba(255,0,0,0.4);
      pointer-events: none;
      animation: deductFloat 1.2s ease-out forwards;
      z-index: 100;
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
    }

    .earn-particle {
      position: fixed;
      font-size: 14px;
      font-weight: bold;
      color: #00ff00;
      text-shadow: 0 0 20px #00ff00, 0 0 40px rgba(0,255,0,0.8), 0 0 60px rgba(0,255,0,0.4);
      pointer-events: none;
      animation: earnFloat 1.5s ease-out forwards;
      z-index: 100;
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
    }

    @keyframes deductFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      30% { opacity: 1; transform: translateY(-15px) scale(1.5); }
      70% { opacity: 0.8; transform: translateY(-35px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-55px) scale(0.8); }
    }

    @keyframes earnFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      30% { opacity: 1; transform: translateY(-20px) scale(1.5); }
      70% { opacity: 0.8; transform: translateY(-45px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-70px) scale(0.8); }
    }

    .running-hedgehog {
      position: absolute;
      font-size: 4.8rem;
      cursor: pointer;
      user-select: none;
      z-index: 20;
      padding: 25px;
      margin: -25px;
      will-change: transform;
    }

    .running-hedgehog.hit {
      animation: hitShake 0.4s ease-out forwards;
    }

    @keyframes hitShake {
      0% { transform: scale(1) rotate(0deg); }
      15% { transform: scale(0.7) rotate(-3deg); }
      30% { transform: scale(1.1) rotate(2deg); }
      45% { transform: scale(0.85) rotate(-2deg); }
      60% { transform: scale(1.05) rotate(1deg); }
      80% { transform: scale(0.95) rotate(-1deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .running-hedgehog.dying {
      pointer-events: none;
    }

    .hat-indicator {
      position: absolute;
      top: 45px;
      left: 34%;
      transform: translateX(-50%);
      font-size: 1.6rem;
      pointer-events: none;
      z-index: 25;
      line-height: 1;
    }

    .health-bar {
      position: absolute;
      top: 27px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 5px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(255,0,0,0.4), inset 0 0 8px rgba(255,0,0,0.2);
    }

    .health-fill {
      height: 100%;
      width: 100%;
      background: #ff0000;
      transition: width 0.15s ease;
      box-shadow: 0 0 20px #ff0000, 0 0 40px rgba(255,0,0,0.6), 0 0 60px rgba(255,0,0,0.3);
    }

    .heart-particle {
      position: fixed;
      pointer-events: none;
      z-index: 250;
      font-size: 1.8rem;
      animation: heartFloat 0.675s ease-out forwards;
    }

    @keyframes heartFloat {
      0% { opacity: 1; transform: translate(0, 0) scale(0.8); }
      40% { opacity: 1; transform: translate(0, -30px) scale(1.3); }
      100% { opacity: 0; transform: translate(0, 50px) scale(0.6); }
    }

    .win-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      pointer-events: none;
      animation: winFade 4s ease-out forwards;
    }

    .win-text {
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: clamp(4rem, 15vw, 8rem);
      color: #ffdd00;
      text-shadow: 0 0 40px #ffdd00, 0 0 80px rgba(255,221,0,0.6), 0 0 120px rgba(255,221,0,0.3);
      animation: winScale 1.2s ease-out forwards;
    }

    @keyframes winScale {
      0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
      30% { transform: scale(1.4) rotate(3deg); opacity: 1; }
      50% { transform: scale(0.95) rotate(-1deg); opacity: 1; }
      70% { transform: scale(1.05) rotate(0.5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes winFade {
      0% { opacity: 0; }
      8% { opacity: 1; }
      82% { opacity: 1; }
      100% { opacity: 0; }
    }

    .btn {
      background: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 1.3rem;
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.1s;
      background: #f0f0f0;
      color: #222;
      box-shadow: 0 0 0 transparent;
      position: relative;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.9);
      box-shadow: 0 0 18px #00bcd4;
      background: #e0e0e0;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn.shake-btn {
      animation: btnShake 0.8s ease-in-out forwards;
    }

    @keyframes btnShake {
      0% { transform: translateX(0); }
      15% { transform: translateX(-14px) rotate(-3deg); }
      30% { transform: translateX(12px) rotate(3deg); }
      45% { transform: translateX(-10px) rotate(-2deg); }
      60% { transform: translateX(8px) rotate(2deg); }
      75% { transform: translateX(-5px) rotate(-1deg); }
      85% { transform: translateX(3px) rotate(1deg); }
      100% { transform: translateX(0) rotate(0deg); }
    }

    .sell-btn.full {
      box-shadow: 0 0 30px #ff0000, 0 0 60px rgba(255,0,0,0.6), 0 0 90px rgba(255,0,0,0.3) !important;
      background: #ff2222 !important;
      animation: btnPulse 1s ease-in-out infinite;
    }

    @keyframes btnPulse {
      0% { box-shadow: 0 0 30px #ff0000, 0 0 60px rgba(255,0,0,0.6), 0 0 90px rgba(255,0,0,0.3); }
      50% { box-shadow: 0 0 50px #ff0000, 0 0 80px rgba(255,0,0,0.8), 0 0 120px rgba(255,0,0,0.4); }
      100% { box-shadow: 0 0 30px #ff0000, 0 0 60px rgba(255,0,0,0.6), 0 0 90px rgba(255,0,0,0.3); }
    }

    .hunt-btn {
      background: #ff69b4;
      color: white;
      box-shadow: 0 0 30px #00bcd4;
      margin-top: 10px;
      transition: opacity 0.8s;
    }

    .hunt-btn:active {
      box-shadow: 0 0 50px #00bcd4, 0 0 30px #ff69b4;
      background: #ff85c0;
    }

    .sell-btn {
      background: #ff69b4;
      color: white;
      box-shadow: 0 0 20px #ff69b4;
      margin-top: 0px;
      margin-bottom: 8px;
      transition: box-shadow 0.3s ease, background 0.3s ease;
    }

    .sell-btn:active {
      box-shadow: 0 0 30px #ff69b4;
      background: #ff85c0;
    }

    .dress-btn {
      background: #00bcd4;
      color: white;
      box-shadow: 0 0 20px #ff69b4;
      margin-top: 5px;
    }

    .dress-btn:active {
      box-shadow: 0 0 30px #ff69b4;
      background: #00d5ee;
    }

    .holocaust-btn {
      background: #ff4444;
      color: white;
      box-shadow: 0 0 20px #ff4444;
      margin-top: 5px;
      position: relative;
      transition: opacity 0.3s;
    }

    .holocaust-btn:active {
      box-shadow: 0 0 30px #ff4444;
      background: #ff6666;
    }

    .holocaust-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: 0 0 10px rgba(255,68,68,0.2);
    }

    .holocaust-btn .cooldown-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      border-radius: 40px;
      pointer-events: none;
    }

    .holocaust-btn .cooldown-text {
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 1.5rem;
      color: white;
      text-shadow: 0 0 20px white, 0 0 40px rgba(255,255,255,0.6);
    }

    .price-tag {
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 1.2rem;
      margin-top: 2px;
      text-align: center;
      width: 100%;
    }

    .price-tag.affordable {
      color: #00ff00;
      text-shadow: 0 0 12px #00ff00;
    }

    .price-tag.expensive {
      color: #ff0000;
      text-shadow: 0 0 12px #ff0000;
    }

    .hidden {
      display: none !important;
    }

    .countdown-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      pointer-events: none;
    }

    .countdown-number {
      font-family: 'Fredoka One', 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 15rem;
      color: #ff0000;
      text-shadow: 0 0 80px #ff0000, 0 0 160px #ff0000;
      animation: countdownPulse 1s ease-in-out;
    }

    @keyframes countdownPulse {
      0% { transform: scale(2); opacity: 0; }
      20% { transform: scale(1.2); opacity: 1; }
      80% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0; }
    }

    .explosion-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      pointer-events: none;
      animation: explosionFlash 0.8s ease-out forwards;
    }

    .explosion-emoji {
      font-size: 20rem;
      animation: explosionScale 0.8s ease-out forwards;
    }

    @keyframes explosionFlash {
      0% { background: rgba(255,200,100,0.9); }
      20% { background: rgba(255,100,50,0.8); }
      100% { background: rgba(0,0,0,0); opacity: 0; }
    }

    @keyframes explosionScale {
      0% { transform: scale(0.5) rotate(0deg); opacity: 0; }
      30% { transform: scale(1.5) rotate(20deg); opacity: 1; }
      60% { transform: scale(1.8) rotate(-10deg); opacity: 1; }
      100% { transform: scale(2) rotate(0deg); opacity: 0; }
    }

    .button-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 5px;
      width: 100%;
    }

    .button-row .btn {
      margin-top: 0;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 120px;
    }

    .btn-group.center {
      flex: 1.5;
    }

    .btn-group .price-tag {
      margin-top: 2px;
    }

    .bottom-row {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 5px;
      width: 100%;
    }

    .bottom-row .btn {
      margin-top: 0;
      padding: 12px 20px;
      font-size: 1.1rem;
    }

    .bottom-row .btn-group {
      flex: 0 1 auto;
      min-width: 100px;
    }
  </style>
</head>
<body id="mainBody">

  <div class="top-bar">
    <span class="version">v1.0</span>
    <span class="timer" id="timer">00:00</span>
  </div>

  <div class="game-container" id="gameContainer">
    <div class="click-counter" id="clickCounter">0/294</div>

    <div class="hedgehog-area" id="hedgehogArea">
      <span class="hedgehog" id="mainHedgehog">🦔</span>
      <div class="hold-hint" id="holdHint">zazhmi na mnee ❤️</div>
    </div>

    <div class="money-counter hidden" id="moneyCounter">0$</div>
    <div class="hunt-counter-wrapper">
      <div class="hunt-counter hidden" id="huntCounter">Caught: 0</div>
    </div>
    
    <div class="button-row hidden" id="buttonRow">
      <div class="btn-group center">
        <button class="btn sell-btn" id="sellButton">Sell 🦔 😛</button>
      </div>
    </div>
    
    <div class="hunt-container hidden" id="huntContainer"></div>

    <div class="bottom-row hidden" id="bottomRow">
      <div class="btn-group">
        <button class="btn holocaust-btn" id="holocaustButton">Holocost💥</button>
        <div class="price-tag hidden" id="holocaustPriceTag">500$</div>
      </div>
      
      <div class="btn-group">
        <button class="btn dress-btn" id="dressButton">Dress up 🦔</button>
        <div class="price-tag hidden" id="priceTag">13000$</div>
      </div>
    </div>

    <button class="btn hunt-btn hidden" id="huntButton">Go hunt</button>
  </div>

  <script>
    (function() {
      let totalClicks = 0;
      const TARGET_CLICKS = 294;
      const MAX_HEDGEHOGS = 20;
      let huntActive = false;
      let caughtCount = 0;
      let money = 0;
      let hatsUnlocked = false;
      let hedgehogsInHunt = [];
      let spawnInterval = null;
      let animationFrame = null;
      let huntContainerWidth = 0;
      let huntContainerHeight = 0;
      let shakeTimeout = null;
      let massSpawnTimeout = null;
      let countdownActive = false;
      let countdownInterval = null;
      let taxInterval = null;
      let isFull = false;
      let heartInterval = null;
      let lastMouseX = 0;
      let lastMouseY = 0;
      
      let holdInterval = null;
      let isHolding = false;

      let holocaustCooldown = false;
      let holocaustCooldownInterval = null;

      let timerInterval = null;
      let startTime = null;
      let timerVisible = false;

      let holdVibrationInterval = null;

      const body = document.getElementById('mainBody');
      const clickCounterEl = document.getElementById('clickCounter');
      const mainHedgehog = document.getElementById('mainHedgehog');
      const holdHint = document.getElementById('holdHint');
      const hedgehogArea = document.getElementById('hedgehogArea');
      const huntCounterEl = document.getElementById('huntCounter');
      const moneyCounterEl = document.getElementById('moneyCounter');
      const huntContainer = document.getElementById('huntContainer');
      const huntButton = document.getElementById('huntButton');
      const sellButton = document.getElementById('sellButton');
      const dressButton = document.getElementById('dressButton');
      const holocaustButton = document.getElementById('holocaustButton');
      const priceTag = document.getElementById('priceTag');
      const holocaustPriceTag = document.getElementById('holocaustPriceTag');
      const buttonRow = document.getElementById('buttonRow');
      const bottomRow = document.getElementById('bottomRow');
      const timerEl = document.getElementById('timer');

      function vibrate(ms) {
        if (navigator.vibrate) {
          navigator.vibrate(ms);
        }
      }

      function startHoldVibration() {
        if (navigator.vibrate) {
          holdVibrationInterval = setInterval(() => {
            navigator.vibrate(30);
          }, 60);
        }
      }

      function stopHoldVibration() {
        if (holdVibrationInterval) {
          clearInterval(holdVibrationInterval);
          holdVibrationInterval = null;
          if (navigator.vibrate) {
            navigator.vibrate(0);
          }
        }
      }

      document.addEventListener('gesturestart', function(e) {
        e.preventDefault();
      });

      document.addEventListener('gesturechange', function(e) {
        e.preventDefault();
      });

      document.addEventListener('gestureend', function(e) {
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
      });

      function updateTimer() {
        if (!startTime) return;
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const seconds = String(elapsed % 60).padStart(2, '0');
        timerEl.textContent = `${minutes}:${seconds}`;
      }

      function startTimer() {
        if (timerInterval) return;
        startTime = Date.now();
        timerEl.classList.add('visible');
        timerVisible = true;
        timerInterval = setInterval(updateTimer, 1000);
        updateTimer();
      }

      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      function showWin() {
        const overlay = document.createElement('div');
        overlay.className = 'win-overlay';
        const text = document.createElement('div');
        text.className = 'win-text';
        text.textContent = 'WIN';
        overlay.appendChild(text);
        document.body.appendChild(overlay);
        setTimeout(() => {
          overlay.remove();
        }, 4000);
      }

      function updateClickDisplay() {
        clickCounterEl.textContent = `${totalClicks}/${TARGET_CLICKS}`;
        if (totalClicks >= TARGET_CLICKS) {
          holdHint.classList.add('hidden');
        }
      }

      function updateHuntCounter() {
        huntCounterEl.textContent = `Caught: ${caughtCount}`;
        if (caughtCount >= MAX_HEDGEHOGS) {
          isFull = true;
          huntCounterEl.classList.add('full');
          sellButton.classList.add('full');
        } else {
          isFull = false;
          huntCounterEl.classList.remove('full');
          sellButton.classList.remove('full');
        }
      }

      function updateMoneyCounter() {
        moneyCounterEl.textContent = `${money}$`;
        updatePriceTag();
        updateHolocaustPriceTag();
        if (hatsUnlocked) {
          stopTimer();
        }
      }

      function updatePriceTag() {
        if (money >= 13000) {
          priceTag.className = 'price-tag affordable';
        } else {
          priceTag.className = 'price-tag expensive';
        }
      }

      function updateHolocaustPriceTag() {
        let price = money > 10000 ? 150 : 500;
        holocaustPriceTag.textContent = price + '$';
        if (money >= price) {
          holocaustPriceTag.className = 'price-tag affordable';
        } else {
          holocaustPriceTag.className = 'price-tag expensive';
        }
      }

      function getHolocaustPrice() {
        return money > 10000 ? 150 : 500;
      }

      function spawnDeductParticle(amount) {
        const rect = moneyCounterEl.getBoundingClientRect();
        const side = Math.random() < 0.5 ? -1 : 1;
        const x = rect.left + rect.width / 2 + side * (40 + Math.random() * 30);
        const y = rect.top + rect.height / 2 + (Math.random() - 0.5) * 20;
        
        const particle = document.createElement('span');
        particle.className = 'deduct-particle';
        particle.textContent = `-${amount}$`;
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.color = '#ff0000';
        particle.style.textShadow = '0 0 20px #ff0000, 0 0 40px rgba(255,0,0,0.8), 0 0 60px rgba(255,0,0,0.4)';
        document.body.appendChild(particle);
        
        setTimeout(() => {
          particle.remove();
        }, 1200);
      }

      function spawnEarnParticle(amount) {
        const rect = moneyCounterEl.getBoundingClientRect();
        const side = Math.random() < 0.5 ? -1 : 1;
        const x = rect.left + rect.width / 2 + side * (40 + Math.random() * 30);
        const y = rect.top + rect.height / 2 + (Math.random() - 0.5) * 20;
        
        const particle = document.createElement('span');
        particle.className = 'earn-particle';
        particle.textContent = `+${amount}$`;
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.color = '#00ff00';
        particle.style.textShadow = '0 0 20px #00ff00, 0 0 40px rgba(0,255,0,0.8), 0 0 60px rgba(0,255,0,0.4)';
        document.body.appendChild(particle);
        
        setTimeout(() => {
          particle.remove();
        }, 1500);
      }

      function applyTax() {
        if (!huntActive) return;
        let taxAmount = 25;
        if (money > 10000) {
          taxAmount = 50;
        }
        if (money >= taxAmount) {
          money -= taxAmount;
          updateMoneyCounter();
          spawnDeductParticle(taxAmount);
        }
      }

      function spawnHeart(x, y) {
        const heart = document.createElement('span');
        heart.className = 'heart-particle';
        heart.textContent = '❤️';
        heart.style.left = `${x}px`;
        heart.style.top = `${y}px`;
        document.body.appendChild(heart);
        setTimeout(() => {
          heart.remove();
        }, 675);
      }

      function getHedgehogCenter() {
        const rect = mainHedgehog.getBoundingClientRect();
        return {
          x: rect.left + rect.width / 2,
          y: rect.top + rect.height / 2
        };
      }

      function startHeartTrail() {
        if (heartInterval) return;
        heartInterval = setInterval(() => {
          if (isHolding) {
            const center = getHedgehogCenter();
            spawnHeart(center.x + (Math.random() - 0.5) * 260, center.y + (Math.random() - 0.5) * 260);
          }
        }, 80);
      }

      function stopHeartTrail() {
        if (heartInterval) {
          clearInterval(heartInterval);
          heartInterval = null;
        }
      }

      function triggerShake() {
        if (shakeTimeout) clearTimeout(shakeTimeout);
        mainHedgehog.classList.add('shaking');
        shakeTimeout = setTimeout(() => {
          mainHedgehog.classList.remove('shaking');
        }, 300);
      }

      function triggerGlow(e) {
        mainHedgehog.classList.add('glow-active');
        setTimeout(() => {
          mainHedgehog.classList.remove('glow-active');
        }, 300);
        triggerShake();
      }

      function addClick(e) {
        if (huntActive) return;
        if (totalClicks >= TARGET_CLICKS) return;
        
        triggerGlow(e);
        totalClicks++;
        updateClickDisplay();

        if (totalClicks === 293) {
          clickCounterEl.style.opacity = '0';
        }

        if (totalClicks === TARGET_CLICKS) {
          clickCounterEl.style.opacity = '0';
          holdHint.classList.add('hidden');
          activate294Effect();
        }
        vibrate(500);
      }

      function startHold(e) {
        if (huntActive) return;
        if (totalClicks >= TARGET_CLICKS) return;
        
        isHolding = true;
        mainHedgehog.classList.add('hold-glow');
        holdHint.classList.add('hidden');
        
        startHoldVibration();
        startHeartTrail();
        addClick(e);
        
        holdInterval = setInterval(() => {
          if (!isHolding || huntActive || totalClicks >= TARGET_CLICKS) {
            stopHold();
            return;
          }
          addClick(e);
        }, 50);
      }

      function stopHold() {
        isHolding = false;
        if (holdInterval) {
          clearInterval(holdInterval);
          holdInterval = null;
        }
        mainHedgehog.classList.remove('hold-glow');
        stopHoldVibration();
        stopHeartTrail();
        if (totalClicks < TARGET_CLICKS && !huntActive) {
          holdHint.classList.remove('hidden');
        }
      }

      function onMainHedgehogPointerDown(e) {
        e.preventDefault();
        if (e.type === 'mousedown') {
          startHold(e);
        } else if (e.type === 'touchstart') {
          const touch = e.touches[0];
          const mouseEvent = new MouseEvent('mousedown', {
            clientX: touch.clientX,
            clientY: touch.clientY
          });
          startHold(mouseEvent);
        }
      }

      function onMainHedgehogPointerUp(e) {
        e.preventDefault();
        stopHold();
      }

      function onMainHedgehogPointerLeave(e) {
        stopHold();
      }

      function activate294Effect() {
        mainHedgehog.classList.add('green-glow');
        mainHedgehog.style.transition = 'opacity 0.6s';
        
        setTimeout(() => {
          mainHedgehog.style.opacity = '0';
        }, 3000);

        setTimeout(() => {
          mainHedgehog.style.display = 'none';
          mainHedgehog.classList.remove('green-glow');
          huntButton.classList.remove('hidden');
          huntButton.style.opacity = '0';
          huntButton.style.transition = 'opacity 0.8s';
          setTimeout(() => {
            huntButton.style.opacity = '1';
          }, 50);
        }, 3600);
      }

      function showCountdown(callback) {
        if (countdownActive) return;
        countdownActive = true;

        const overlay = document.createElement('div');
        overlay.className = 'countdown-overlay';
        const numberEl = document.createElement('div');
        numberEl.className = 'countdown-number';
        overlay.appendChild(numberEl);
        document.body.appendChild(overlay);

        let count = 3;
        numberEl.textContent = count;
        numberEl.style.animation = 'none';
        void numberEl.offsetHeight;
        numberEl.style.animation = 'countdownPulse 1s ease-in-out';
        vibrate(400);

        countdownInterval = setInterval(() => {
          count--;
          if (count > 0) {
            numberEl.textContent = count;
            numberEl.style.animation = 'none';
            void numberEl.offsetHeight;
            numberEl.style.animation = 'countdownPulse 1s ease-in-out';
            vibrate(400);
          } else {
            clearInterval(countdownInterval);
            countdownInterval = null;
            overlay.remove();
            countdownActive = false;
            if (callback) callback();
          }
        }, 1000);
      }

      function startHunt() {
        if (countdownActive) return;

        showCountdown(() => {
          huntActive = true;
          caughtCount = 0;
          hedgehogsInHunt = [];
          isFull = false;
          holdHint.classList.add('hidden');
          
          huntButton.classList.add('hidden');
          moneyCounterEl.classList.remove('hidden');
          huntCounterEl.classList.remove('hidden');
          buttonRow.classList.remove('hidden');
          bottomRow.classList.remove('hidden');
          huntContainer.classList.remove('hidden');
          priceTag.classList.remove('hidden');
          holocaustPriceTag.classList.remove('hidden');
          updateHuntCounter();
          updateMoneyCounter();
          
          updateHuntContainerSize();
          
          startTimer();
          
          spawnInterval = setInterval(() => {
            if (!huntActive) return;
            const countToSpawn = Math.random() < 0.5 ? 1 : 2;
            for (let i = 0; i < countToSpawn; i++) {
              spawnRunningHedgehog(false);
            }
          }, 1000);

          massSpawnTimeout = setInterval(() => {
            if (!huntActive) return;
            for (let i = 0; i < 12; i++) {
              spawnRunningHedgehog(true);
            }
          }, 15000);

          taxInterval = setInterval(applyTax, 1000);

          animationFrame = requestAnimationFrame(moveHedgehogs);
        });
      }

      function updateHuntContainerSize() {
        const rect = huntContainer.getBoundingClientRect();
        huntContainerWidth = rect.width;
        huntContainerHeight = rect.height;
      }

      window.addEventListener('resize', () => {
        if (huntActive) updateHuntContainerSize();
      });

      function spawnRunningHedgehog(isFast) {
        if (!huntActive) return;
        
        const hedgehogEl = document.createElement('span');
        hedgehogEl.className = 'running-hedgehog';
        hedgehogEl.textContent = '🦔';
        
        const yPos = Math.random() * (huntContainerHeight - 70) + 20;
        hedgehogEl.style.top = `${yPos}px`;
        hedgehogEl.style.left = `${huntContainerWidth + 20}px`;
        
        const speed = isFast ? (Math.random() * 3 + 3.6) * 1.134 : (Math.random() * 1.5 + 1.8) * 1.134;
        
        const hedgehogData = {
          element: hedgehogEl,
          x: huntContainerWidth + 20,
          y: yPos,
          speed: speed,
          health: 3,
          verticalDrift: 0,
          driftSpeed: (Math.random() - 0.5) * 0.25,
          id: Date.now() + Math.random(),
          isDying: false,
          hasHat: hatsUnlocked,
          isFast: isFast,
          fallProgress: 0,
          fallStartY: yPos,
          fallEndY: 0,
          fallRotation: 0,
          fallScale: 1,
          isFalling: false,
          bounceProgress: 0,
          isBouncing: false,
          bounceStartY: yPos,
          bounceHeight: 0
        };
        
        if (hedgehogData.hasHat) {
          const hatEl = document.createElement('span');
          hatEl.className = 'hat-indicator';
          hatEl.textContent = '🎩';
          hedgehogEl.appendChild(hatEl);
        }
        
        const healthBar = document.createElement('div');
        healthBar.className = 'health-bar';
        const healthFill = document.createElement('div');
        healthFill.className = 'health-fill';
        healthFill.style.width = '100%';
        healthBar.appendChild(healthFill);
        hedgehogEl.appendChild(healthBar);
        
        hedgehogEl.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!huntActive) return;
          if (hedgehogData.health <= 0) return;
          if (hedgehogData.isDying) return;
          
          if (isFull) {
            return;
          }
          
          hedgehogEl.classList.remove('hit');
          void hedgehogEl.offsetHeight;
          hedgehogEl.classList.add('hit');
          
          vibrate(15);
          
          hedgehogData.health--;
          healthFill.style.width = `${(hedgehogData.health/3)*100}%`;
          
          if (hedgehogData.health <= 0) {
            hedgehogData.isDying = true;
            hedgehogData.isBouncing = true;
            hedgehogData.bounceProgress = 0;
            hedgehogData.bounceStartY = hedgehogData.y;
            hedgehogData.bounceHeight = 30 + Math.random() * 25;
            
            caughtCount++;
            updateHuntCounter();
            
            if (hedgehogData.hasHat) {
              money += 10000;
              updateMoneyCounter();
              spawnEarnParticle(10000);
            }
            
            hedgehogEl.classList.add('dying');
          }
        });
        
        huntContainer.appendChild(hedgehogEl);
        hedgehogsInHunt.push(hedgehogData);
      }

      function moveHedgehogs() {
        if (!huntActive) {
          cancelAnimationFrame(animationFrame);
          return;
        }
        
        updateHuntContainerSize();
        
        for (let i = hedgehogsInHunt.length - 1; i >= 0; i--) {
          const h = hedgehogsInHunt[i];
          if (!h.element.isConnected) {
            hedgehogsInHunt.splice(i,1);
            continue;
          }
          
          if (h.isBouncing) {
            h.bounceProgress += 0.035;
            
            if (h.bounceProgress < 0.4) {
              const t = h.bounceProgress / 0.4;
              const jumpHeight = h.bounceHeight * Math.sin(t * Math.PI);
              const currentY = h.bounceStartY - jumpHeight;
              h.element.style.top = `${currentY}px`;
              h.element.style.transform = `rotate(${t * 15}deg) scale(1)`;
            } else if (h.bounceProgress < 0.7) {
              const t = (h.bounceProgress - 0.4) / 0.3;
              const currentY = h.bounceStartY - h.bounceHeight * 0.2;
              h.element.style.top = `${currentY}px`;
              h.element.style.transform = `rotate(${15 - t * 15}deg) scale(1.05)`;
            } else if (h.bounceProgress < 1) {
              const t = (h.bounceProgress - 0.7) / 0.3;
              const fallEase = t * t;
              const currentY = (h.bounceStartY - h.bounceHeight * 0.2) + (h.bounceStartY + 20 - (h.bounceStartY - h.bounceHeight * 0.2)) * fallEase;
              h.element.style.top = `${currentY}px`;
              h.fallRotation = t * 30;
              h.element.style.transform = `rotate(${h.fallRotation}deg) scale(${1 - t * 0.1})`;
            }
            
            if (h.bounceProgress >= 1) {
              h.isBouncing = false;
              h.isFalling = true;
              h.fallProgress = 0;
              h.fallStartY = h.bounceStartY + 20;
              h.fallEndY = huntContainerHeight + 50;
            }
            continue;
          }
          
          if (h.isFalling) {
            h.fallProgress += 0.0207;
            if (h.fallProgress > 1) h.fallProgress = 1;
            
            const ease = h.fallProgress * h.fallProgress * h.fallProgress;
            const currentY = h.fallStartY + (h.fallEndY - h.fallStartY) * ease;
            
            h.fallRotation = ease * ease * 360;
            h.fallScale = 1 - ease * 0.8;
            
            h.element.style.top = `${currentY}px`;
            h.element.style.transform = `rotate(${h.fallRotation}deg) scale(${Math.max(0.1, h.fallScale)})`;
            h.element.style.opacity = 1 - ease * 0.9;
            
            if (h.fallProgress >= 1) {
              h.element.remove();
              const idx = hedgehogsInHunt.findIndex(hed => hed.id === h.id);
              if (idx > -1) hedgehogsInHunt.splice(idx,1);
            }
            continue;
          }
          
          if (h.isDying) continue;
          
          h.x -= h.speed;
          h.verticalDrift += h.driftSpeed;
          if (Math.abs(h.verticalDrift) > 12) h.driftSpeed *= -1;
          h.y += h.verticalDrift * 0.3;
          
          if (h.y < 15) h.y = 15;
          if (h.y > huntContainerHeight - 65) h.y = huntContainerHeight - 65;
          
          h.element.style.left = `${h.x}px`;
          h.element.style.top = `${h.y}px`;
          h.element.style.transform = '';
          
          if (h.x < -120) {
            h.element.remove();
            hedgehogsInHunt.splice(i,1);
          }
        }
        
        animationFrame = requestAnimationFrame(moveHedgehogs);
      }

      function sellHedgehogs() {
        if (!huntActive) return;
        let amount = caughtCount * 100;
        money += amount;
        caughtCount = 0;
        isFull = false;
        huntCounterEl.classList.remove('full');
        sellButton.classList.remove('full');
        updateHuntCounter();
        updateMoneyCounter();
        if (amount > 0) {
          spawnEarnParticle(amount);
        }
        vibrate(10);
      }

      function dressHedgehogs() {
        if (!huntActive) return;
        if (money >= 13000 && !hatsUnlocked) {
          money -= 13000;
          hatsUnlocked = true;
          updateMoneyCounter();
          
          hedgehogsInHunt.forEach(h => {
            if (!h.isDying && h.element.isConnected) {
              const existingHat = h.element.querySelector('.hat-indicator');
              if (!existingHat) {
                const hatEl = document.createElement('span');
                hatEl.className = 'hat-indicator';
                hatEl.textContent = '🎩';
                h.element.appendChild(hatEl);
              }
              h.hasHat = true;
            }
          });
          
          stopTimer();
          showWin();
          vibrate(50);
        }
      }

      function startHolocaustCooldown() {
        holocaustCooldown = true;
        holocaustButton.disabled = true;
        
        let remaining = 20;
        
        const overlay = document.createElement('div');
        overlay.className = 'cooldown-overlay';
        const text = document.createElement('span');
        text.className = 'cooldown-text';
        text.textContent = remaining;
        overlay.appendChild(text);
        holocaustButton.appendChild(overlay);
        
        holocaustCooldownInterval = setInterval(() => {
          remaining--;
          if (remaining <= 0) {
            clearInterval(holocaustCooldownInterval);
            holocaustCooldownInterval = null;
            holocaustCooldown = false;
            holocaustButton.disabled = false;
            const overlayEl = holocaustButton.querySelector('.cooldown-overlay');
            if (overlayEl) overlayEl.remove();
          } else {
            text.textContent = remaining;
          }
        }, 1000);
      }

      function holocaust() {
        if (!huntActive) return;
        if (holocaustCooldown && !hatsUnlocked) return;
        const price = getHolocaustPrice();
        if (money < price) return;
        
        money -= price;
        updateMoneyCounter();
        
        vibrate(1000);
        
        const overlay = document.createElement('div');
        overlay.className = 'explosion-overlay';
        const emoji = document.createElement('div');
        emoji.className = 'explosion-emoji';
        emoji.textContent = '💥';
        overlay.appendChild(emoji);
        document.body.appendChild(overlay);
        
        setTimeout(() => {
          overlay.remove();
        }, 800);
        
        let killed = 0;
        const toRemove = [];
        
        for (let i = hedgehogsInHunt.length - 1; i >= 0; i--) {
          const h = hedgehogsInHunt[i];
          if (!h.isDying && h.element.isConnected) {
            h.isDying = true;
            h.isFalling = true;
            h.fallProgress = 0;
            h.fallStartY = h.y;
            h.fallEndY = huntContainerHeight + 50;
            h.element.classList.add('dying');
            toRemove.push(i);
            killed++;
            caughtCount++;
            
            if (h.hasHat) {
              money += 10000;
              spawnEarnParticle(10000);
            }
          }
        }
        
        setTimeout(() => {
          toRemove.forEach(index => {
            const h = hedgehogsInHunt[index];
            if (h && h.element && h.element.isConnected) {
              h.element.remove();
            }
          });
          hedgehogsInHunt = hedgehogsInHunt.filter(h => h.element && h.element.isConnected && !h.isDying);
          updateMoneyCounter();
        }, 1000);
        
        updateHuntCounter();
        
        if (!hatsUnlocked) {
          startHolocaustCooldown();
        }
      }

      mainHedgehog.addEventListener('mousedown', onMainHedgehogPointerDown);
      mainHedgehog.addEventListener('mouseup', onMainHedgehogPointerUp);
      mainHedgehog.addEventListener('mouseleave', onMainHedgehogPointerLeave);
      mainHedgehog.addEventListener('touchstart', onMainHedgehogPointerDown, { passive: false });
      mainHedgehog.addEventListener('touchend', onMainHedgehogPointerUp, { passive: false });
      mainHedgehog.addEventListener('touchcancel', onMainHedgehogPointerUp, { passive: false });

      sellButton.addEventListener('click', sellHedgehogs);
      dressButton.addEventListener('click', dressHedgehogs);
      holocaustButton.addEventListener('click', holocaust);
      huntButton.addEventListener('click', startHunt);

      updateClickDisplay();
    })();
  </script>
</body>
</html>
