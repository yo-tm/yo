<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>Ёж • 294 клика</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      background: #3b3b3b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
      position: relative;
      margin: 0;
      padding: 20px;
    }

    .game-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .copy-btn-top {
      background: #0a0a0a;
      color: red;
      font-family: 'Times New Roman', Times, serif;
      font-size: 14px;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 400;
      transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.1s;
      box-shadow: 0 0 0 transparent;
      margin: 0 auto 36px auto;
      display: block;
    }

    .copy-btn-top:active {
      transform: scale(0.9);
      box-shadow: 0 0 18px #00bcd4;
      background: #1a1a1a;
    }

    .copy-success-msg {
      color: red;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12px;
      z-index: 401;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      text-align: center;
      margin-top: 4px;
    }

    .click-counter {
      color: white;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      margin-bottom: 10px;
      margin-top: -10px;
      text-align: center;
      transition: opacity 0.2s, color 0.3s, text-shadow 0.3s;
      z-index: 10;
    }

    .hedgehog-area {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }

    .hedgehog {
      font-size: clamp(5rem, 20vw, 12rem);
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.25s ease, opacity 0.3s;
      position: relative;
      display: inline-block;
      line-height: 1;
      filter: drop-shadow(0 0 0 transparent);
      z-index: 5;
      user-select: none;
    }

    .hedgehog:active {
      transform: scale(0.9);
    }

    .hedgehog.glow-active {
      filter: drop-shadow(0 0 18px #ff69b4) drop-shadow(0 0 35px rgba(255,105,180,0.8));
    }

    .hedgehog.shaking {
      animation: shake 0.3s ease-in-out;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }

    .hedgehog.green-glow {
      filter: drop-shadow(0 0 25px #00ff00) drop-shadow(0 0 50px #00ff00);
      animation: spinAccelerate 3s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
    }

    @keyframes spinAccelerate {
      0% { transform: rotate(0deg); animation-timing-function: ease-in; }
      30% { transform: rotate(360deg); animation-timing-function: linear; }
      70% { transform: rotate(1080deg); animation-timing-function: linear; }
      100% { transform: rotate(3600deg); }
    }

    .message-area {
      position: relative;
      width: 100%;
      text-align: center;
      min-height: 40px;
      margin: 10px 0;
    }

    .hint-text {
      font-family: 'Times New Roman', Times, serif;
      font-size: 32px;
      color: red;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      line-height: 1.3;
      text-align: center;
      animation: none;
    }

    .hint-text.vibrate {
      animation: vibrate 0.08s infinite;
    }

    @keyframes vibrate {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-1.5px, 1px); }
      50% { transform: translate(1.5px, -1px); }
      75% { transform: translate(-1px, -1.5px); }
      100% { transform: translate(1px, 1.5px); }
    }

    .hunt-container {
      position: relative;
      width: 100%;
      height: 300px;
      overflow: hidden;
      background: transparent;
      border-radius: 12px;
      margin-top: 5px;
    }

    .hunt-counter {
      color: white;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 1.6rem;
      margin-bottom: 5px;
      text-align: center;
      width: 100%;
      transition: color 0.3s, text-shadow 0.3s;
    }

    .running-hedgehog {
      position: absolute;
      font-size: 2.8rem;
      cursor: pointer;
      transition: transform 0.05s ease;
      user-select: none;
      z-index: 20;
    }

    .health-bar {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 6px;
      background: #555;
      border-radius: 3px;
      overflow: hidden;
    }

    .health-fill {
      height: 100%;
      width: 100%;
      background: #e53935;
      transition: width 0.1s ease;
    }

    .last-hedgehog-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      color: black;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      padding: 16px 24px;
      border-radius: 24px;
      font-size: 1.4rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 200;
      transition: opacity 0.7s;
    }

    .last-hedgehog-sticker {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      font-size: 4rem;
      z-index: 199;
      transition: opacity 0.7s;
    }

    .screenshot-hint {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 10px;
      color: white;
      z-index: 198;
      transition: opacity 0.7s;
      text-align: center;
    }

    .password-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      color: white;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
    }

    .password-input {
      padding: 12px 18px;
      font-size: 1.3rem;
      border-radius: 30px;
      border: none;
      outline: none;
      text-align: center;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      width: 200px;
    }

    .btn {
      background: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 1.3rem;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.1s;
      background: #f0f0f0;
      color: #222;
      box-shadow: 0 0 0 transparent;
    }

    .btn:active {
      transform: scale(0.9);
      box-shadow: 0 0 18px #00bcd4;
      background: #e0e0e0;
    }

    .error-message {
      color: red;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-weight: bold;
      transition: opacity 0.3s;
    }

    .final-text {
      font-family: 'Times New Roman', Times, serif;
      font-size: 14px;
      color: red;
      text-align: center;
      margin: 10px 0;
      word-break: break-word;
    }

    .bottom-hint {
      font-family: 'Times New Roman', Times, serif;
      font-size: 14px;
      color: #1c1c1c;
      margin-top: 1.5rem;
      text-align: center;
      animation: vibrate 0.08s infinite;
    }

    .heart-particle {
      position: fixed;
      pointer-events: none;
      z-index: 250;
      font-size: 1.5rem;
      animation: heartFloat 0.5s ease-out forwards;
    }

    @keyframes heartFloat {
      0% { opacity: 1; transform: translate(0, 0) scale(0.8); }
      40% { opacity: 1; transform: translate(0, -20px) scale(1.2); }
      100% { opacity: 0; transform: translate(0, 30px) scale(0.6); }
    }

    .mistake-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Times New Roman', Times, serif;
      font-size: 36px;
      color: red;
      font-weight: bold;
      z-index: 350;
      pointer-events: none;
      animation: vibrate 0.08s infinite;
      opacity: 1;
      transition: opacity 0.3s;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body id="mainBody">

  <div class="game-container" id="gameContainer">
    <div class="click-counter" id="clickCounter">0/294</div>

    <div class="hedgehog-area" id="hedgehogArea">
      <span class="hedgehog" id="mainHedgehog">🦔</span>
    </div>

    <div class="message-area" id="messageArea">
      <div class="hint-text" id="hintText">HINT:<br>Base64</div>
    </div>

    <div class="hunt-counter hidden" id="huntCounter">0/13</div>
    <div class="hunt-container hidden" id="huntContainer"></div>

    <button class="btn hidden" id="huntButton">На охоту</button>

    <div class="password-panel hidden" id="passwordPanel">
      <span>Введите пароль (🦔)</span>
      <input type="text" class="password-input" id="passwordInput" placeholder="пароль" inputmode="numeric" pattern="[0-9]*">
      <button class="btn" id="submitPassword">Подтвердить</button>
      <div class="error-message" id="errorMessage"></div>
    </div>

    <div id="finalMessageContainer" class="hidden" style="text-align: center; margin-top: 20px;">
      <button class="copy-btn-top" id="copyBtnTop">copy..//</button>
      <div class="copy-success-msg" id="copySuccessMsg">successfully../</div>
      <div class="final-text" id="base64Text">Q29tZSBiYWNrIGxhdGVyLCBhbmQgd2UnbGwgY29udGludWUgaGVyZS4=</div>
      <div class="final-text" id="youWillNeed">YOU WILL NEED IT: 13663</div>
      <div class="bottom-hint" id="hedgehogKnows">THE HEDGEHOG IN THE BEGINNING KNOWS EVERYTHING</div>
    </div>
  </div>

  <script>
    (function() {
      let totalClicks = 0;
      const TARGET_CLICKS = 294;
      let twoHundredEventTriggered = false;
      let huntActive = false;
      let caughtCount = 0;
      const TARGET_CAUGHT = 13;
      let hedgehogsInHunt = [];
      let spawnInterval = null;
      let animationFrame = null;
      let huntContainerWidth = 0;
      let huntContainerHeight = 0;
      let twoHundredEventInProgress = false;
      let errorTimeout = null;
      let huntFinished = false;
      let shakeTimeout = null;

      const body = document.getElementById('mainBody');
      const clickCounterEl = document.getElementById('clickCounter');
      const mainHedgehog = document.getElementById('mainHedgehog');
      const hedgehogArea = document.getElementById('hedgehogArea');
      const hintText = document.getElementById('hintText');
      const huntCounterEl = document.getElementById('huntCounter');
      const huntContainer = document.getElementById('huntContainer');
      const huntButton = document.getElementById('huntButton');
      const passwordPanel = document.getElementById('passwordPanel');
      const passwordInput = document.getElementById('passwordInput');
      const submitPasswordBtn = document.getElementById('submitPassword');
      const errorMessageEl = document.getElementById('errorMessage');
      const finalMessageContainer = document.getElementById('finalMessageContainer');
      const copyBtnTop = document.getElementById('copyBtnTop');
      const copySuccessMsg = document.getElementById('copySuccessMsg');

      passwordInput.addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
      });

      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          checkPassword();
          return;
        }
        if (!/[0-9]/.test(e.key)) {
          e.preventDefault();
        }
      });

      function updateClickDisplay() {
        clickCounterEl.textContent = `${totalClicks}/${TARGET_CLICKS}`;
      }

      function spawnHeart(x, y) {
        const heart = document.createElement('span');
        heart.className = 'heart-particle';
        heart.textContent = '❤️';
        heart.style.left = `${x}px`;
        heart.style.top = `${y}px`;
        document.body.appendChild(heart);
        setTimeout(() => {
          heart.remove();
        }, 500);
      }

      function triggerShake() {
        if (shakeTimeout) clearTimeout(shakeTimeout);
        mainHedgehog.classList.add('shaking');
        shakeTimeout = setTimeout(() => {
          mainHedgehog.classList.remove('shaking');
        }, 300);
      }

      function triggerGlow(e) {
        mainHedgehog.classList.add('glow-active');
        setTimeout(() => {
          mainHedgehog.classList.remove('glow-active');
        }, 300);
        triggerShake();
        spawnHeart(e.clientX, e.clientY);
      }

      function hideCounterAndHedgehog() {
        clickCounterEl.style.opacity = '0';
        hedgehogArea.style.opacity = '0';
      }

      function showCounterAndHedgehog() {
        clickCounterEl.style.opacity = '1';
        hedgehogArea.style.opacity = '1';
      }

      function handleTwoHundredClicks() {
        if (twoHundredEventTriggered || twoHundredEventInProgress) return;
        twoHundredEventTriggered = true;
        twoHundredEventInProgress = true;

        hideCounterAndHedgehog();
        body.style.backgroundColor = '#000000';
        hintText.style.opacity = '1';
        hintText.classList.add('vibrate');

        setTimeout(() => {
          body.style.backgroundColor = '#ff0000';
        }, 3000);

        setTimeout(() => {
          body.style.backgroundColor = '#3b3b3b';
          hintText.style.opacity = '0';
          hintText.classList.remove('vibrate');
          showCounterAndHedgehog();
          twoHundredEventInProgress = false;
          updateClickDisplay();
        }, 3100);
      }

      function onMainHedgehogClick(e) {
        e.stopPropagation();
        if (huntActive) return;
        if (totalClicks >= TARGET_CLICKS) return;
        if (twoHundredEventInProgress) return;

        triggerGlow(e);

        totalClicks++;
        updateClickDisplay();

        if (totalClicks === 200 && !twoHundredEventTriggered) {
          handleTwoHundredClicks();
        }

        if (totalClicks === 293) {
          clickCounterEl.style.opacity = '0';
        }

        if (totalClicks === TARGET_CLICKS) {
          clickCounterEl.style.opacity = '0';
          activate294Effect();
        }
      }

      function activate294Effect() {
        mainHedgehog.classList.add('green-glow');
        mainHedgehog.style.transition = 'opacity 0.6s';
        
        setTimeout(() => {
          mainHedgehog.style.opacity = '0';
        }, 3000);

        setTimeout(() => {
          mainHedgehog.style.display = 'none';
          mainHedgehog.classList.remove('green-glow');
          huntButton.classList.remove('hidden');
          huntButton.style.opacity = '0';
          huntButton.style.transition = 'opacity 0.8s';
          setTimeout(() => {
            huntButton.style.opacity = '1';
          }, 50);
        }, 3600);
      }

      function startHunt() {
        huntActive = true;
        caughtCount = 0;
        huntFinished = false;
        hedgehogsInHunt = [];
        
        huntButton.classList.add('hidden');
        huntCounterEl.classList.remove('hidden');
        huntContainer.classList.remove('hidden');
        huntCounterEl.style.color = 'white';
        huntCounterEl.style.textShadow = 'none';
        updateHuntCounter();

        hintText.style.opacity = '0';
        hintText.classList.remove('vibrate');
        
        updateHuntContainerSize();
        
        const catchText = document.createElement('div');
        catchText.id = 'catchAllText';
        catchText.textContent = 'Поймай их всех)';
        catchText.style.color = 'white';
        catchText.style.fontFamily = '"Comic Sans MS", "Comic Sans", cursive, sans-serif';
        catchText.style.fontSize = '1.8rem';
        catchText.style.textAlign = 'center';
        catchText.style.marginBottom = '5px';
        huntContainer.parentNode.insertBefore(catchText, huntContainer);

        spawnInterval = setInterval(() => {
          if (caughtCount >= TARGET_CAUGHT || huntFinished) {
            return;
          }
          const countToSpawn = Math.random() < 0.5 ? 3 : 4;
          for (let i = 0; i < countToSpawn; i++) {
            if (caughtCount >= TARGET_CAUGHT || huntFinished) break;
            spawnRunningHedgehog();
          }
        }, 1000);

        animationFrame = requestAnimationFrame(moveHedgehogs);
      }

      function updateHuntContainerSize() {
        const rect = huntContainer.getBoundingClientRect();
        huntContainerWidth = rect.width;
        huntContainerHeight = rect.height;
      }

      window.addEventListener('resize', () => {
        if (huntActive) updateHuntContainerSize();
      });

      function spawnRunningHedgehog() {
        if (!huntActive) return;
        if (caughtCount >= TARGET_CAUGHT) return;
        if (huntFinished) return;
        
        const hedgehogEl = document.createElement('span');
        hedgehogEl.className = 'running-hedgehog';
        hedgehogEl.textContent = '🦔';
        
        const yPos = Math.random() * (huntContainerHeight - 50) + 10;
        hedgehogEl.style.top = `${yPos}px`;
        hedgehogEl.style.left = '-60px';
        
        const hedgehogData = {
          element: hedgehogEl,
          x: -60,
          y: yPos,
          speed: Math.random() * 1.5 + 1.8,
          health: 3,
          verticalDrift: 0,
          driftSpeed: (Math.random() - 0.5) * 0.25,
          id: Date.now() + Math.random()
        };
        
        const healthBar = document.createElement('div');
        healthBar.className = 'health-bar';
        const healthFill = document.createElement('div');
        healthFill.className = 'health-fill';
        healthFill.style.width = '100%';
        healthBar.appendChild(healthFill);
        hedgehogEl.appendChild(healthBar);
        
        hedgehogEl.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!huntActive) return;
          if (hedgehogData.health <= 0) return;
          
          hedgehogEl.style.transform = 'scale(0.8)';
          setTimeout(() => {
            if (hedgehogEl.isConnected) hedgehogEl.style.transform = '';
          }, 120);
          
          hedgehogData.health--;
          healthFill.style.width = `${(hedgehogData.health/3)*100}%`;
          
          if (hedgehogData.health <= 0) {
            caughtCount++;
            updateHuntCounter();
            
            if (caughtCount === 1) {
              huntCounterEl.style.color = '#ff69b4';
              huntCounterEl.style.textShadow = '0 0 12px #ff69b4';
            } else if (caughtCount === 2) {
              huntCounterEl.style.color = 'white';
              huntCounterEl.style.textShadow = 'none';
            }
            
            if (caughtCount === TARGET_CAUGHT && !huntFinished) {
              huntFinished = true;
              hedgehogEl.remove();
              const idx = hedgehogsInHunt.findIndex(h => h.id === hedgehogData.id);
              if (idx > -1) hedgehogsInHunt.splice(idx,1);
              
              clearInterval(spawnInterval);
              cancelAnimationFrame(animationFrame);
              
              hedgehogsInHunt.forEach(h => h.element.remove());
              hedgehogsInHunt = [];
              huntContainer.innerHTML = '';
              huntContainer.classList.add('hidden');
              
              const catchText = document.getElementById('catchAllText');
              if (catchText) catchText.remove();
              
              huntCounterEl.style.color = '#00ff00';
              huntCounterEl.style.textShadow = '0 0 20px #00ff00, 0 0 35px #00ff00';
              
              setTimeout(() => {
                huntCounterEl.classList.add('hidden');
                showLastHedgehogMessage();
              }, 1700);
              
            } else if (caughtCount < TARGET_CAUGHT) {
              hedgehogEl.remove();
              const idx = hedgehogsInHunt.findIndex(h => h.id === hedgehogData.id);
              if (idx > -1) hedgehogsInHunt.splice(idx,1);
            }
          }
        });
        
        huntContainer.appendChild(hedgehogEl);
        hedgehogsInHunt.push(hedgehogData);
      }

      function moveHedgehogs() {
        if (!huntActive) {
          cancelAnimationFrame(animationFrame);
          return;
        }
        
        updateHuntContainerSize();
        
        for (let i = hedgehogsInHunt.length - 1; i >= 0; i--) {
          const h = hedgehogsInHunt[i];
          if (!h.element.isConnected) {
            hedgehogsInHunt.splice(i,1);
            continue;
          }
          
          h.x += h.speed;
          h.verticalDrift += h.driftSpeed;
          if (Math.abs(h.verticalDrift) > 8) h.driftSpeed *= -1;
          h.y += h.verticalDrift * 0.3;
          
          if (h.y < 5) h.y = 5;
          if (h.y > huntContainerHeight - 45) h.y = huntContainerHeight - 45;
          
          h.element.style.left = `${h.x}px`;
          h.element.style.top = `${h.y}px`;
          
          if (h.x > huntContainerWidth + 40) {
            h.element.remove();
            hedgehogsInHunt.splice(i,1);
          }
        }
        
        animationFrame = requestAnimationFrame(moveHedgehogs);
      }

      function updateHuntCounter() {
        huntCounterEl.textContent = `${caughtCount}/${TARGET_CAUGHT}`;
      }

      function showLastHedgehogMessage() {
        const messageEl = document.createElement('div');
        messageEl.className = 'last-hedgehog-message';
        messageEl.textContent = '..... ..--- ..... ..--- ..... ..---';
        messageEl.style.top = 'calc(50% - 90px)';
        document.body.appendChild(messageEl);

        const screenshotHint = document.createElement('div');
        screenshotHint.className = 'screenshot-hint';
        screenshotHint.textContent = 'скринь!!';
        screenshotHint.style.top = 'calc(50% - 40px)';
        document.body.appendChild(screenshotHint);

        const stickerEl = document.createElement('div');
        stickerEl.className = 'last-hedgehog-sticker';
        stickerEl.textContent = '🦔';
        stickerEl.style.top = 'calc(50% + 60px)';
        document.body.appendChild(stickerEl);

        setTimeout(() => {
          messageEl.style.opacity = '0';
          stickerEl.style.opacity = '0';
          screenshotHint.style.opacity = '0';
          setTimeout(() => {
            messageEl.remove();
            stickerEl.remove();
            screenshotHint.remove();
            passwordPanel.classList.remove('hidden');
            passwordInput.value = '';
            errorMessageEl.textContent = '';
          }, 700);
        }, 5000);
      }

      function showErrorTemporary(msg) {
        if (errorTimeout) clearTimeout(errorTimeout);
        errorMessageEl.textContent = msg;
        errorMessageEl.style.opacity = '1';
        errorTimeout = setTimeout(() => {
          errorMessageEl.style.opacity = '0';
          setTimeout(() => {
            errorMessageEl.textContent = '';
          }, 300);
        }, 1000);
      }

      submitPasswordBtn.addEventListener('click', checkPassword);

      function checkPassword() {
        const entered = passwordInput.value.trim();
        if (entered === '525252') {
          errorMessageEl.textContent = '';
          triggerFinalSequence();
        } else {
          showErrorTemporary('Неверный пароль🦔!');
        }
      }

      function triggerFinalSequence() {
        passwordPanel.classList.add('hidden');
        
        let blinkCount = 0;
        const totalBlinks = 24;
        const blinkInterval = setInterval(() => {
          if (blinkCount % 2 === 0) {
            body.style.backgroundColor = '#000000';
          } else {
            body.style.backgroundColor = '#ff0000';
          }
          blinkCount++;
          if (blinkCount >= totalBlinks) {
            clearInterval(blinkInterval);
            body.style.backgroundColor = '#000000';
            
            const mistakeEl = document.createElement('div');
            mistakeEl.className = 'mistake-popup';
            mistakeEl.textContent = 'MISTAKE';
            document.body.appendChild(mistakeEl);
            
            setTimeout(() => {
              mistakeEl.style.opacity = '0';
              setTimeout(() => {
                mistakeEl.remove();
                finalMessageContainer.classList.remove('hidden');
              }, 300);
            }, 700);
          }
        }, 125);
      }

      copyBtnTop.addEventListener('click', () => {
        const textToCopy = 'Q29tZSBiYWNrIGxhdGVyLCBhbmQgd2UnbGwgY29udGludWUgaGVyZS4=';
        navigator.clipboard.writeText(textToCopy).then(() => {
          copySuccessMsg.style.opacity = '1';
          setTimeout(() => {
            copySuccessMsg.style.opacity = '0';
          }, 1000);
        }).catch(() => {
          const textarea = document.createElement('textarea');
          textarea.value = textToCopy;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          copySuccessMsg.style.opacity = '1';
          setTimeout(() => {
            copySuccessMsg.style.opacity = '0';
          }, 1000);
        });
      });

      mainHedgehog.addEventListener('click', onMainHedgehogClick);
      huntButton.addEventListener('click', startHunt);

      updateClickDisplay();
    })();
  </script>
</body>
</html>
